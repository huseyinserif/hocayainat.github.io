<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Hüseyin Yönetim Paneli</title>
    <style>
        body { background: #080c14; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #141d2e; padding: 40px; border-radius: 25px; border: 1px solid #00d4ff; width: 350px; text-align: center; box-shadow: 0 0 30px rgba(0,212,255,0.1); }
        h2 { color: #00d4ff; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #080c14; border: 1px solid #1f2937; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #00d4ff; color: #080c14; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
        button:hover { background: #00b8e6; }
        .info { color: #6b7a99; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Sistem Yönetimi</h2>
        <input type="text" id="iqInput" placeholder="IQ Değeri (Örn: 500 IQ)">
        <input type="text" id="notInput" placeholder="Alt Yazı (Örn: Hocadan Zeki!)">
        <button onclick="kaydet()">SİSTEMİ GÜNCELLE</button>
        <div class="info">Değişiklik yaptıktan sonra ana sayfayı yenileyin.</div>
    </div>

    <script>
        function kaydet() {
            const iqVal = document.getElementById('iqInput').value;
            const notVal = document.getElementById('notInput').value;

            if(iqVal) localStorage.setItem('siteIQ', iqVal);
            if(notVal) localStorage.setItem('siteNOT', notVal);

            alert("Veriler tarayıcıya kaydedildi! Şimdi ana sayfaya gidip bakabilirsin.");
        }
    </script>
</body>
</html>
